<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/vite.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Today</title>
  </head>
  <body>
    <dialog class="dialog confirm-dialog" data-copy="dialogs.confirmDeleteAria" data-copy-attr="aria-label">
      <header class="dialog__header">
        <span class="dialog__title" data-copy="dialogs.confirmDeleteTitle"></span>
        <form method="dialog">
          <button class="dialog__close" data-copy="dialogs.dismiss" data-copy-attr="aria-label">
            <svg width="14" height="14" viewBox="0 0 14 14" fill="none" aria-hidden="true">
              <path d="M1 1l12 12M13 1L1 13" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>
            </svg>
          </button>
        </form>
      </header>
      <p class="confirm-dialog__detail"></p>
      <div class="confirm-dialog__actions">
        <button class="confirm-dialog__cancel" type="button" data-copy="dialogs.confirmKeep"></button>
        <button class="confirm-dialog__confirm" type="button" data-copy="dialogs.confirmDelete"></button>
      </div>
    </dialog>

    <dialog class="dialog auth-dialog" data-copy="auth.accountAria" data-copy-attr="aria-label">
      <div class="auth-dialog__auth-view">
        <header class="dialog__header">
          <span class="dialog__title" aria-hidden="true" data-copy="auth.authDialogTitle"></span>
          <form method="dialog">
            <button class="dialog__close" data-copy="auth.dismiss" data-copy-attr="aria-label">
              <svg width="14" height="14" viewBox="0 0 14 14" fill="none" aria-hidden="true">
                <path d="M1 1l12 12M13 1L1 13" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>
              </svg>
            </button>
          </form>
        </header>
        <p class="auth-dialog__lead" data-copy="auth.lead"></p>
        <div class="auth-dialog__tabs" role="tablist">
          <button class="auth-dialog__tab is-active" role="tab" data-mode="signup" aria-selected="true" data-copy="auth.tabSignUp"></button>
          <button class="auth-dialog__tab" role="tab" data-mode="signin" aria-selected="false" data-copy="auth.tabSignIn"></button>
        </div>
        <form class="auth-dialog__form" novalidate>
          <div class="auth-dialog__field">
            <label class="auth-dialog__label" for="auth-email" data-copy="auth.labelEmail"></label>
            <input class="auth-dialog__input" id="auth-email" type="email" name="email" autocomplete="email" required />
          </div>
          <div class="auth-dialog__field auth-dialog__field--password">
            <label class="auth-dialog__label" for="auth-password" data-copy="auth.labelPassword"></label>
            <div class="auth-dialog__password-wrapper">
              <input
                class="auth-dialog__input"
                id="auth-password"
                type="password"
                name="password"
                autocomplete="current-password"
                required
              />
              <button
                class="auth-dialog__password-toggle"
                type="button"
                data-copy="auth.showPassword"
                data-copy-attr="aria-label"
                aria-pressed="false"
              >
                <span
                  class="auth-dialog__password-icon auth-dialog__password-icon--hidden"
                  aria-hidden="true"
                >
                  <svg width="16" height="16" viewBox="0 0 24 24" fill="none">
                    <path
                      d="M1 1l22 22"
                      stroke="currentColor"
                      stroke-width="1.5"
                      stroke-linecap="round"
                    />
                    <path
                      d="M3 12s2.5-5.5 9-5.5 9 5.5 9 5.5a15.6 15.6 0 01-3.07 3.73"
                      stroke="currentColor"
                      stroke-width="1.5"
                      stroke-linecap="round"
                      stroke-linejoin="round"
                    />
                    <path
                      d="M10.6 10.6a2.5 2.5 0 013.4 3.4"
                      stroke="currentColor"
                      stroke-width="1.5"
                      stroke-linecap="round"
                      stroke-linejoin="round"
                    />
                  </svg>
                </span>
                <span
                  class="auth-dialog__password-icon auth-dialog__password-icon--visible"
                  aria-hidden="true"
                >
                  <svg width="16" height="16" viewBox="0 0 24 24" fill="none">
                    <path
                      d="M3 12s2.5-5.5 9-5.5 9 5.5 9 5.5-2.5 5.5-9 5.5S3 12 3 12z"
                      stroke="currentColor"
                      stroke-width="1.5"
                      stroke-linecap="round"
                      stroke-linejoin="round"
                    />
                    <circle
                      cx="12"
                      cy="12"
                      r="2.5"
                      stroke="currentColor"
                      stroke-width="1.5"
                    />
                  </svg>
                </span>
              </button>
            </div>
          </div>
          <p class="auth-dialog__error" role="alert" hidden></p>
          <button class="auth-dialog__submit" type="submit">
            <span class="auth-dialog__submit-label" data-copy="auth.submitSignUp"></span>
            <span class="auth-dialog__submit-arrow" aria-hidden="true">→</span>
          </button>
        </form>
      </div>
      <div class="auth-dialog__user-view" hidden>
        <header class="dialog__header">
          <span class="dialog__title" aria-hidden="true" data-copy="auth.accountTitle"></span>
          <form method="dialog">
            <button class="dialog__close" data-copy="auth.dismiss" data-copy-attr="aria-label">
              <svg width="14" height="14" viewBox="0 0 14 14" fill="none" aria-hidden="true">
                <path d="M1 1l12 12M13 1L1 13" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>
              </svg>
            </button>
          </form>
        </header>
        <p class="auth-dialog__user-email"></p>
        <button class="auth-dialog__sign-out" type="button">
          <span data-copy="auth.signOut"></span>
          <span aria-hidden="true">→</span>
        </button>
      </div>
    </dialog>

    <div id="app" class="todo-app">
      <header class="todo-app__header">
        <p class="todo-app__eyebrow" aria-hidden="true"></p>
        <nav class="todo-app__title-nav" data-copy="today.viewNavAria" data-copy-attr="aria-label">
          <button class="todo-app__title-link is-active" type="button" data-view="today" aria-pressed="true" data-copy="today.todayTab"></button>
          <button class="todo-app__title-link" type="button" data-view="trails" aria-pressed="false" data-copy="today.trailsTab"></button>
        </nav>
        <p class="todo-app__progress" aria-live="polite"></p>
        <button class="todo-app__account-button" type="button" data-copy="auth.accountAria" data-copy-attr="aria-label" aria-haspopup="dialog">
          <i data-lucide="user"></i>
        </button>
      </header>

      <form class="todo-app__form" data-copy="today.formAria" data-copy-attr="aria-label">
        <label class="todo-app__label" for="todo-input" data-copy="today.formLabel"></label>
        <div class="todo-app__input-wrapper">
          <input
            id="todo-input"
            class="todo-app__input"
            type="text"
            name="todo"
            data-copy="today.placeholder"
            data-copy-attr="placeholder"
            autocomplete="off"
          />
          <div class="todo-app__form-toolbar">
            <button type="button" class="journey-context" data-copy="today.currentJourneyAria" data-copy-attr="aria-label">
              <span class="journey-context__name" data-copy="today.journeyDefault"></span>
            </button>
            <button class="todo-app__add-button" type="submit" data-copy="today.addStepAria" data-copy-attr="aria-label">
              <i data-lucide="plus"></i>
            </button>
          </div>
        </div>
      </form>

      <div class="todo-app__sort-bar" role="group" data-copy="today.sortBarAria" data-copy-attr="aria-label" hidden>
        <button class="todo-app__sort-chip is-active" type="button" data-sort="time-asc" data-copy="today.sortOldest"></button>
        <button class="todo-app__sort-chip" type="button" data-sort="time-desc" data-copy="today.sortNewest"></button>
        <button class="todo-app__sort-chip" type="button" data-sort="status" data-copy="today.sortActive"></button>
        <button class="todo-app__sort-chip" type="button" data-sort="priority" data-copy="today.sortPriority"></button>
        <button class="todo-app__sort-chip" type="button" data-sort="journey" data-copy="today.sortJourney"></button>
      </div>

      <section class="todo-app__items" aria-live="polite" data-copy="today.itemsAria" data-copy-attr="aria-label"></section>

      <section class="trail-view" data-copy="today.trailsSectionAria" data-copy-attr="aria-label" hidden></section>
    </div>
    <script type="module" src="/src/main.js"></script>
  </body>
</html>
