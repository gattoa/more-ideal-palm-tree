<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/vite.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Today</title>
  </head>
  <body>
    <dialog class="auth-dialog" aria-label="Account">
      <div class="auth-dialog__auth-view">
        <header class="auth-dialog__header">
          <span class="auth-dialog__mark" aria-hidden="true">Today</span>
          <form method="dialog">
            <button class="auth-dialog__close" aria-label="Dismiss">
              <svg width="14" height="14" viewBox="0 0 14 14" fill="none" aria-hidden="true">
                <path d="M1 1l12 12M13 1L1 13" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>
              </svg>
            </button>
          </form>
        </header>
        <p class="auth-dialog__lead">Keep your steps with you, across every device.</p>
        <div class="auth-dialog__tabs" role="tablist">
          <button class="auth-dialog__tab is-active" role="tab" data-mode="signup" aria-selected="true">Create account</button>
          <button class="auth-dialog__tab" role="tab" data-mode="signin" aria-selected="false">Sign in</button>
        </div>
        <form class="auth-dialog__form" novalidate>
          <div class="auth-dialog__field">
            <label class="auth-dialog__label" for="auth-email">Email</label>
            <input class="auth-dialog__input" id="auth-email" type="email" name="email" autocomplete="email" required />
          </div>
          <div class="auth-dialog__field auth-dialog__field--password">
            <label class="auth-dialog__label" for="auth-password">Password</label>
            <div class="auth-dialog__password-wrapper">
              <input
                class="auth-dialog__input"
                id="auth-password"
                type="password"
                name="password"
                autocomplete="current-password"
                required
              />
              <button
                class="auth-dialog__password-toggle"
                type="button"
                aria-label="Show password"
                aria-pressed="false"
              >
                <span
                  class="auth-dialog__password-icon auth-dialog__password-icon--hidden"
                  aria-hidden="true"
                >
                  <svg width="16" height="16" viewBox="0 0 24 24" fill="none">
                    <path
                      d="M1 1l22 22"
                      stroke="currentColor"
                      stroke-width="1.5"
                      stroke-linecap="round"
                    />
                    <path
                      d="M3 12s2.5-5.5 9-5.5 9 5.5 9 5.5a15.6 15.6 0 01-3.07 3.73"
                      stroke="currentColor"
                      stroke-width="1.5"
                      stroke-linecap="round"
                      stroke-linejoin="round"
                    />
                    <path
                      d="M10.6 10.6a2.5 2.5 0 013.4 3.4"
                      stroke="currentColor"
                      stroke-width="1.5"
                      stroke-linecap="round"
                      stroke-linejoin="round"
                    />
                  </svg>
                </span>
                <span
                  class="auth-dialog__password-icon auth-dialog__password-icon--visible"
                  aria-hidden="true"
                >
                  <svg width="16" height="16" viewBox="0 0 24 24" fill="none">
                    <path
                      d="M3 12s2.5-5.5 9-5.5 9 5.5 9 5.5-2.5 5.5-9 5.5S3 12 3 12z"
                      stroke="currentColor"
                      stroke-width="1.5"
                      stroke-linecap="round"
                      stroke-linejoin="round"
                    />
                    <circle
                      cx="12"
                      cy="12"
                      r="2.5"
                      stroke="currentColor"
                      stroke-width="1.5"
                    />
                  </svg>
                </span>
              </button>
            </div>
          </div>
          <p class="auth-dialog__error" role="alert" hidden></p>
          <button class="auth-dialog__submit" type="submit">
            <span class="auth-dialog__submit-label">Create account</span>
            <span class="auth-dialog__submit-arrow" aria-hidden="true">→</span>
          </button>
        </form>
      </div>
      <div class="auth-dialog__user-view" hidden>
        <header class="auth-dialog__header">
          <span class="auth-dialog__mark" aria-hidden="true">Account</span>
          <form method="dialog">
            <button class="auth-dialog__close" aria-label="Dismiss">
              <svg width="14" height="14" viewBox="0 0 14 14" fill="none" aria-hidden="true">
                <path d="M1 1l12 12M13 1L1 13" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>
              </svg>
            </button>
          </form>
        </header>
        <p class="auth-dialog__user-email"></p>
        <button class="auth-dialog__sign-out" type="button">
          <span>Sign out</span>
          <span aria-hidden="true">→</span>
        </button>
      </div>
    </dialog>

    <div id="app" class="todo-app">
      <header class="todo-app__header">
        <p class="todo-app__eyebrow" aria-hidden="true"></p>
        <h1 class="todo-app__title">Today</h1>
        <p class="todo-app__progress" aria-live="polite"></p>
        <button class="todo-app__account-button" type="button" aria-label="Account" aria-haspopup="dialog">
          <i data-lucide="user"></i>
        </button>
      </header>

      <nav class="view-nav" aria-label="View">
        <button class="view-nav__tab is-active" type="button" data-view="today" aria-pressed="true">Today</button>
        <button class="view-nav__tab" type="button" data-view="week" aria-pressed="false">This Week</button>
      </nav>

      <form class="todo-app__form" aria-label="Add a new step">
        <label class="todo-app__label" for="todo-input">New step</label>
        <div class="todo-app__input-wrapper">
          <input
            id="todo-input"
            class="todo-app__input"
            type="text"
            name="todo"
            placeholder="What's your next step?"
            autocomplete="off"
          />
          <div class="todo-app__form-toolbar">
            <div class="journey-picker">
              <button
                type="button"
                class="journey-picker__trigger"
                aria-haspopup="listbox"
                aria-expanded="false"
                aria-label="Select journey"
              >
                <span class="journey-picker__dot" aria-hidden="true"></span>
                <span class="journey-picker__label">Journey</span>
                <i data-lucide="chevron-down" class="journey-picker__chevron"></i>
              </button>
              <div class="journey-picker__dropdown" role="listbox" hidden>
                <!-- Options populated by JS via populateJourneyPicker() -->
              </div>
            </div>
            <div class="path-picker">
              <button
                type="button"
                class="path-picker__trigger"
                aria-haspopup="listbox"
                aria-expanded="false"
                aria-label="Select path"
              >
                <span class="path-picker__label">Path</span>
                <i data-lucide="chevron-down" class="path-picker__chevron"></i>
              </button>
              <div class="path-picker__dropdown" role="listbox" hidden>
                <div class="path-picker__options">
                  <!-- Options populated by JS -->
                </div>
                <div class="path-picker__create">
                  <input
                    class="path-picker__create-input"
                    type="text"
                    placeholder="New path…"
                    aria-label="Create new path"
                  />
                </div>
              </div>
            </div>
            <div class="milestone-picker">
              <button
                type="button"
                class="milestone-picker__trigger"
                aria-haspopup="listbox"
                aria-expanded="false"
                aria-label="Select milestone"
              >
                <span class="milestone-picker__label">Milestone</span>
                <i data-lucide="chevron-down" class="milestone-picker__chevron"></i>
              </button>
              <div class="milestone-picker__dropdown" role="listbox" hidden>
                <div class="milestone-picker__options">
                  <!-- Options populated by JS, filtered by selected journey -->
                </div>
                <div class="milestone-picker__create">
                  <input
                    class="milestone-picker__create-input"
                    type="text"
                    placeholder="New milestone…"
                    aria-label="Create new milestone"
                  />
                </div>
              </div>
            </div>
            <button class="todo-app__add-button" type="submit" aria-label="Add step">
              <i data-lucide="plus"></i>
            </button>
          </div>
        </div>
      </form>

      <section class="todo-app__items" aria-live="polite" aria-label="Today's steps"></section>

      <section class="week-view" aria-label="This week's activity" hidden></section>
    </div>
    <script type="module" src="/src/main.js"></script>
  </body>
</html>
